<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MangaDen — Your Manga Store</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card: #1e1e24;
    --border: #2a2a35;
    --accent: #e63946;
    --gold: #ffd166;
    --text: #f0f0f5;
    --muted: #7a7a90;
    --success: #06d6a0;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

  /* ── Navbar ── */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--accent); text-decoration: none; }
  .logo span { color: var(--gold); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .cart-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 0.5rem 1.1rem; border-radius: 8px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .cart-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cart-count {
    background: var(--accent); color: white; border-radius: 99px;
    font-size: 0.72rem; padding: 0.1rem 0.45rem; font-weight: 900;
  }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(135deg, #1a0a0f 0%, #0d0d0f 50%, #0a0a1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 5rem 2rem 4rem; text-align: center;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: 'MANGA'; position: absolute; font-family: 'Bebas Neue', sans-serif;
    font-size: 22rem; color: rgba(230,57,70,0.035); top: 50%; left: 50%;
    transform: translate(-50%,-50%); pointer-events: none; white-space: nowrap;
  }
  .hero-tag {
    display: inline-block; background: rgba(230,57,70,0.15); color: var(--accent);
    border: 1px solid rgba(230,57,70,0.3); border-radius: 99px;
    font-size: 0.78rem; font-weight: 800; padding: 0.35rem 1rem;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; letter-spacing: 4px; line-height: 0.95; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--muted); margin-top: 1rem; font-size: 1.1rem; max-width: 480px; margin-inline: auto; }
  .search-bar { display: flex; gap: 0.5rem; max-width: 520px; margin: 2rem auto 0; }
  .search-bar input {
    flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 0.85rem 1.1rem; border-radius: 10px; font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; outline: none; transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar button {
    background: var(--accent); color: white; border: none; padding: 0.85rem 1.75rem;
    border-radius: 10px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; transition: background 0.2s; white-space: nowrap;
  }
  .search-bar button:hover { background: #c1121f; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; gap: 0.5rem; padding: 1rem 2rem; overflow-x: auto;
    border-bottom: 1px solid var(--border); background: var(--surface);
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .genre-pill {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 0.45rem 1.1rem; border-radius: 99px; font-size: 0.82rem; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .genre-pill:hover, .genre-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── Sorting ── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;
  }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; }
  .section-title span { color: var(--accent); }
  .toolbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .sort-select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 0.45rem 0.85rem; border-radius: 8px; font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; outline: none; cursor: pointer;
  }
  .count-label { color: var(--muted); font-size: 0.85rem; }

  /* ── Main ── */
  main { max-width: 1400px; margin: 0 auto; padding: 2rem; }

  /* ── Manga grid ── */
  .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.25rem; }
  .manga-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: pointer; position: relative;
  }
  .manga-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 12px 32px rgba(230,57,70,0.15); }
  .manga-cover { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .manga-cover-ph {
    width: 100%; aspect-ratio: 2/3;
    background: linear-gradient(135deg, #1e1e2e 0%, #2a1020 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--muted);
    text-align: center; padding: 1rem; line-height: 1.3;
  }
  .manga-info { padding: 0.8rem; }
  .manga-title { font-weight: 800; font-size: 0.9rem; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .manga-author { color: var(--muted); font-size: 0.76rem; margin-bottom: 0.5rem; }
  .manga-footer { display: flex; align-items: center; justify-content: space-between; }
  .manga-price { color: var(--gold); font-weight: 900; font-size: 0.95rem; }
  .genre-badge { font-size: 0.65rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 99px; text-transform: uppercase; }
  .g-action      { background: rgba(230,57,70,0.15);  color: #e63946; }
  .g-adventure   { background: rgba(255,107,53,0.15); color: #ff6b35; }
  .g-dark        { background: rgba(140,80,180,0.2);  color: #c084fc; }
  .g-supernatural{ background: rgba(6,214,160,0.15);  color: #06d6a0; }
  .g-superhero   { background: rgba(255,209,102,0.15);color: #ffd166; }
  .g-romance     { background: rgba(255,100,130,0.15);color: #ff6482; }
  .g-default     { background: rgba(120,120,160,0.15);color: #9999cc; }
  .badge-oos { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: var(--muted); font-size: 0.62rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: 6px; text-transform: uppercase; backdrop-filter: blur(4px); }
  .badge-low { position: absolute; top: 8px; right: 8px; background: var(--accent); color: white; font-size: 0.62rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: 6px; text-transform: uppercase; }
  .card-oos { opacity: 0.55; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    width: 100%; max-width: 660px; max-height: 92vh; overflow-y: auto;
    transform: scale(0.94) translateY(12px); transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-header {
    padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0;
    background: var(--card); z-index: 1; border-radius: 18px 18px 0 0;
  }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; transition: color 0.2s; line-height: 1; padding: 0.25rem; }
  .modal-close:hover { color: var(--accent); }
  .modal-body { padding: 1.5rem; }

  /* Detail */
  .detail-layout { display: flex; gap: 1.5rem; }
  .detail-cover { width: 155px; flex-shrink: 0; border-radius: 10px; object-fit: cover; aspect-ratio: 2/3; }
  .detail-cover-ph {
    width: 155px; flex-shrink: 0; border-radius: 10px; aspect-ratio: 2/3;
    background: linear-gradient(135deg, #1e1e2e, #2a1020);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--muted); text-align: center; padding: 0.5rem;
  }
  .detail-info { flex: 1; min-width: 0; }
  .detail-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; margin-bottom: 0.3rem; }
  .detail-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.75rem; }
  .detail-desc { font-size: 0.88rem; line-height: 1.65; color: #ccc; margin-bottom: 1.1rem; }
  .detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }
  .meta-item label { display: block; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.2rem; }
  .meta-item .val { font-weight: 800; font-size: 1rem; }
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }
  .buy-section label { display: block; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
  .buy-row { display: flex; gap: 0.6rem; align-items: stretch; }
  .qty-wrap { display: flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .qty-btn { background: var(--surface); border: none; color: var(--text); width: 34px; height: 38px; font-size: 1.1rem; cursor: pointer; transition: background 0.15s; }
  .qty-btn:hover { background: var(--border); }
  .qty-num { width: 44px; background: var(--card); border: none; color: var(--text); text-align: center; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem; outline: none; }
  .buyer-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 0.6rem 0.75rem; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .buyer-input:focus { border-color: var(--accent); }
  .btn-buy {
    background: var(--accent); color: white; border: none; padding: 0 1.5rem;
    border-radius: 8px; font-weight: 900; font-size: 0.9rem; cursor: pointer;
    font-family: 'Nunito', sans-serif; transition: background 0.2s; white-space: nowrap; height: 38px;
  }
  .btn-buy:hover { background: #c1121f; }
  .btn-buy:disabled { background: #333; color: var(--muted); cursor: not-allowed; }

  /* Cart modal */
  .cart-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 0; border-bottom: 1px solid var(--border); }
  .cart-item:last-child { border-bottom: none; }
  .cart-cover { width: 46px; height: 64px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .cart-cover-ph { width: 46px; height: 64px; border-radius: 6px; background: var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--muted); text-align: center; font-family: 'Bebas Neue', sans-serif; }
  .cart-info { flex: 1; min-width: 0; }
  .cart-title { font-weight: 800; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-sub { color: var(--muted); font-size: 0.78rem; margin-top: 0.15rem; }
  .cart-price { color: var(--gold); font-weight: 800; font-size: 0.95rem; text-align: right; }
  .cart-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0.25rem; transition: color 0.2s; }
  .cart-remove:hover { color: var(--accent); }
  .cart-total { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0 0; border-top: 2px solid var(--border); margin-top: 0.5rem; }
  .cart-total-label { font-weight: 800; font-size: 1rem; }
  .cart-total-val { color: var(--gold); font-weight: 900; font-size: 1.25rem; }
  .btn-checkout { width: 100%; background: var(--accent); color: white; border: none; padding: 0.9rem; border-radius: 10px; font-weight: 900; font-size: 1rem; cursor: pointer; font-family: 'Nunito', sans-serif; margin-top: 1rem; transition: background 0.2s; }
  .btn-checkout:hover { background: #c1121f; }
  .btn-checkout:disabled { background: #333; color: var(--muted); cursor: not-allowed; }

  /* Order confirm */
  .order-confirm { text-align: center; padding: 0.5rem 0 1rem; }
  .order-confirm .icon { font-size: 3.5rem; margin-bottom: 0.75rem; }
  .order-confirm h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--success); letter-spacing: 2px; }
  .confirm-details { background: var(--surface); border-radius: 10px; padding: 1rem 1.25rem; margin-top: 1rem; text-align: left; }
  .confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 0.45rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-row span:first-child { color: var(--muted); }
  .confirm-row span:last-child { font-weight: 800; }
  .txn-id { color: var(--gold); font-family: 'Courier New', monospace; font-size: 0.85rem !important; }

  /* Empty / loading */
  .empty { text-align: center; padding: 5rem 2rem; color: var(--muted); grid-column: 1/-1; }
  .empty .icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
  .loading { text-align: center; padding: 4rem; color: var(--muted); grid-column: 1/-1; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--success); padding: 0.75rem 1.25rem; border-radius: 10px; font-size: 0.88rem; font-weight: 700; min-width: 240px; animation: slideIn 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .toast.err { border-left-color: var(--accent); }
  @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(110%); opacity: 0; } }

  /* Footer */
  footer { border-top: 1px solid var(--border); padding: 2rem; text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 4rem; }
  footer a { color: var(--accent); text-decoration: none; font-weight: 700; }
</style>
</head>
<body>

<nav>
  <div class="logo">Manga<span>Den</span></div>
  <div class="nav-right">
    <button class="cart-btn" onclick="openModal('modal-cart')">
      🛒 Cart <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">✦ New Arrivals Every Week</div>
  <h1>YOUR MANGA<br/><span>COLLECTION</span><br/>STARTS HERE</h1>
  <p>Browse thousands of titles. Buy in seconds. Build your perfect shelf.</p>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search by title or author..." oninput="filterManga()"/>
    <button onclick="filterManga()">Search</button>
  </div>
</div>

<div class="filter-bar" id="genre-filter">
  <button class="genre-pill active" onclick="setGenre('All',this)">All</button>
</div>

<main>
  <div class="toolbar">
    <div class="section-title">Available <span>Manga</span></div>
    <div class="toolbar-right">
      <span class="count-label" id="manga-count"></span>
      <select class="sort-select" id="sort-select" onchange="filterManga()">
        <option value="default">Sort: Default</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="title">Title: A → Z</option>
        <option value="stock">In Stock First</option>
      </select>
    </div>
  </div>
  <div id="manga-grid" class="manga-grid">
    <div class="loading"><div class="spinner"></div>Loading manga...</div>
  </div>
</main>

<footer>
  © 2025 <a href="#">MangaDen</a> — All rights reserved.
  <!-- Admin access: admin.html -->
</footer>

<!-- ── Detail Modal ── -->
<div class="modal-overlay" id="modal-detail" onclick="bgClose('modal-detail',event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detail-title">Detail</span>
      <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- ── Cart Modal ── -->
<div class="modal-overlay" id="modal-cart" onclick="bgClose('modal-cart',event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🛒 Your Cart</span>
      <button class="modal-close" onclick="closeModal('modal-cart')">✕</button>
    </div>
    <div class="modal-body" id="cart-body"></div>
  </div>
</div>

<!-- ── Order Result Modal ── -->
<div class="modal-overlay" id="modal-result" onclick="bgClose('modal-result',event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Order Result</span>
      <button class="modal-close" onclick="closeModal('modal-result')">✕</button>
    </div>
    <div class="modal-body" id="result-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// API CONFIG — replace base URL with your Flask backend
// ══════════════════════════════════════════════════════════════════════════════
const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";

const API = isLocal
  ? "http://127.0.0.1:5001"
  : "https://mangaden.onrender.com";

const ORDER_API = isLocal
  ? "http://127.0.0.1:5000"
  : "https://mangaden-order.onrender.com";
/*
  Expected endpoints (JSON):
  GET    /api/manga              → { manga: [ {id, title, author, genre, price, stock, volume, description, cover_url}, ... ] }
  POST   /api/orders             → { order_id, title, buyer, quantity, total, transaction_id, remaining_stock }
  Body:  { manga_id, quantity, buyer_name }
*/

// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
let allManga   = [];
let activeGenre = 'All';
let cart       = []; // { manga, qty }

// ══════════════════════════════════════════════════════════════════════════════
// Bootstrap — load manga on page load
// ══════════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    const res = await fetch(`${API}/manga`);
    const data = await res.json();

    console.log("Fetched data:", data); // debug

    allManga = data.manga || [];

    renderGenrePills();
    filterManga();

  } catch (e) {
  console.error("Fetch error:", e);

  document.getElementById('manga-grid').innerHTML = `
    <div class="empty">
      <span class="icon">⚠️</span>
      <p>Failed to load manga from server.</p>
    </div>
  `;

  toast("Backend not connected", true);
}
}

// ══════════════════════════════════════════════════════════════════════════════
// Genre pills
// ══════════════════════════════════════════════════════════════════════════════
function renderGenrePills() {
  const genres = ['All', ...new Set(allManga.map(m => m.genre).filter(Boolean))];
  document.getElementById('genre-filter').innerHTML = genres.map(g =>
    `<button class="genre-pill${g===activeGenre?' active':''}" onclick="setGenre('${esc(g)}',this)">${g}</button>`
  ).join('');
}

function setGenre(g, btn) {
  activeGenre = g;
  document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  filterManga();
}

// ══════════════════════════════════════════════════════════════════════════════
// Filter + Sort + Render
// ══════════════════════════════════════════════════════════════════════════════
function filterManga() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let list = allManga.filter(m => {
    const gOk = activeGenre === 'All' || m.genre === activeGenre;
    const sOk = !q || m.title.toLowerCase().includes(q) || m.author.toLowerCase().includes(q);
    return gOk && sOk;
  });

  if (sort === 'price-asc')  list = [...list].sort((a,b) => a.price - b.price);
  if (sort === 'price-desc') list = [...list].sort((a,b) => b.price - a.price);
  if (sort === 'title')      list = [...list].sort((a,b) => a.title.localeCompare(b.title));
  if (sort === 'stock')      list = [...list].sort((a,b) => b.stock - a.stock);

  renderGrid(list);
}

function genreClass(g) {
  const map = { Action:'g-action', Adventure:'g-adventure', 'Dark Fantasy':'g-dark',
                Supernatural:'g-supernatural', Superhero:'g-superhero', Romance:'g-romance' };
  return map[g] || 'g-default';
}

function renderGrid(list) {
  const grid = document.getElementById('manga-grid');
  document.getElementById('manga-count').textContent = `${list.length} title${list.length!==1?'s':''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><span class="icon">📭</span><p>No manga found.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(m => {
    const oos = m.stock <= 0;
    const low = m.stock > 0 && m.stock <= 3;
    const badge = oos ? `<div class="badge-oos">Out of Stock</div>`
                : low ? `<div class="badge-low">Only ${m.stock} left!</div>` : '';
    const cover = m.cover_url
      ? `<img class="manga-cover" src="${esc(m.cover_url)}" alt="${esc(m.title)}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="manga-cover-ph" style="display:none">${esc(m.title)}</div>`
      : `<div class="manga-cover-ph">${esc(m.title)}</div>`;
    return `
      <div class="manga-card${oos?' card-oos':''}" onclick="openDetail(${m.id})">
        ${badge}${cover}
        <div class="manga-info">
          <div class="manga-title">${m.title}</div>
          <div class="manga-author">${m.author}</div>
          <div class="manga-footer">
            <span class="manga-price">₱${(+m.price).toFixed(2)}</span>
            <span class="genre-badge ${genreClass(m.genre)}">${m.genre}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════════════════════
// Detail modal
// ══════════════════════════════════════════════════════════════════════════════
function openDetail(id) {
  const m = allManga.find(x => +x.id === +id);
  if (!m) return;
  document.getElementById('detail-title').textContent = m.title;

  const cover = m.cover_url
    ? `<img class="detail-cover" src="${esc(m.cover_url)}" alt="${esc(m.title)}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="detail-cover-ph" style="display:none">${esc(m.title)}</div>`
    : `<div class="detail-cover-ph">${esc(m.title)}</div>`;

  const stockColor = m.stock<=0 ? 'var(--accent)' : m.stock<=3 ? 'var(--gold)' : 'var(--success)';
  const disabled   = m.stock<=0 ? 'disabled' : '';

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-layout">
      ${cover}
      <div class="detail-info">
        <div class="detail-title">${m.title}</div>
        <div class="detail-sub">by <strong>${m.author}</strong> · Vol. ${m.volume||1} · <span class="genre-badge ${genreClass(m.genre)}">${m.genre}</span></div>
        <div class="detail-desc">${m.description || 'No description available.'}</div>
        <div class="detail-meta">
          <div class="meta-item"><label>Price</label><span class="val" style="color:var(--gold)">₱${(+m.price).toFixed(2)}</span></div>
          <div class="meta-item"><label>Stock</label><span class="val" style="color:${stockColor}">${m.stock<=0?'Out of Stock':m.stock+' units'}</span></div>
        </div>
        <div class="divider"></div>
        <div class="buy-section">
          <label>Add to Cart</label>
          <div class="buy-row">
            <div class="qty-wrap">
              <button class="qty-btn" onclick="stepQty(-1)" ${disabled}>−</button>
              <input class="qty-num" type="number" id="buy-qty" value="1" min="1" max="${m.stock}" ${disabled} readonly/>
              <button class="qty-btn" onclick="stepQty(1)" ${disabled}>+</button>
            </div>
            <input class="buyer-input" type="text" id="buy-name" placeholder="Your name (optional)" ${disabled}/>
            <button class="btn-buy" onclick="addToCart(${m.id})" ${disabled}>${m.stock<=0?'Sold Out':'Add to Cart'}</button>
          </div>
        </div>
      </div>
    </div>`;
  openModal('modal-detail');
}

function stepQty(delta) {
  const input = document.getElementById('buy-qty');
  const max   = parseInt(input.max) || 99;
  const val   = Math.min(max, Math.max(1, parseInt(input.value||1) + delta));
  input.value = val;
}

// ══════════════════════════════════════════════════════════════════════════════
// Cart
// ══════════════════════════════════════════════════════════════════════════════
function addToCart(id) {
  const m   = allManga.find(x => +x.id === +id);
  const qty = parseInt(document.getElementById('buy-qty').value) || 1;
  const existing = cart.find(c => +c.manga.id === +id);
  if (existing) {
    existing.qty = Math.min(m.stock, existing.qty + qty);
  } else {
    cart.push({ manga: m, qty });
  }
  updateCartCount();
  closeModal('modal-detail');
  toast(`"${m.title}" added to cart! 🛒`);
}

function updateCartCount() {
  document.getElementById('cart-count').textContent = cart.reduce((s,c) => s+c.qty, 0);
}

function renderCart() {
  const body = document.getElementById('cart-body');
  if (!cart.length) {
    body.innerHTML = `<div class="empty"><span class="icon">🛒</span><p>Your cart is empty.</p></div>`;
    return;
  }
  const total = cart.reduce((s,c) => s + c.manga.price * c.qty, 0);
  body.innerHTML = `
    <div id="cart-items">
      ${cart.map((c,i) => `
        <div class="cart-item">
          ${c.manga.cover_url
            ? `<img class="cart-cover" src="${esc(c.manga.cover_url)}" onerror="this.style.display='none'">`
            : `<div class="cart-cover-ph">${esc(c.manga.title)}</div>`}
          <div class="cart-info">
            <div class="cart-title">${c.manga.title}</div>
            <div class="cart-sub">Vol.${c.manga.volume||1} · Qty: ${c.qty}</div>
          </div>
          <div class="cart-price">₱${(c.manga.price * c.qty).toFixed(2)}</div>
          <button class="cart-remove" onclick="removeFromCart(${i})">✕</button>
        </div>`).join('')}
    </div>
    <div style="margin:1rem 0">
      <div style="margin-bottom:0.5rem"><label style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700">Your Name</label></div>
      <input id="checkout-name" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.65rem 0.75rem;border-radius:8px;font-family:Nunito,sans-serif;font-size:0.95rem;outline:none" placeholder="Enter your name to confirm order"/>
    </div>
    <div class="cart-total">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val">₱${total.toFixed(2)}</span>
    </div>
    <button class="btn-checkout" onclick="checkout()">Confirm Order →</button>`;
}

function removeFromCart(i) {
  cart.splice(i, 1);
  updateCartCount();
  renderCart();
}

// ══════════════════════════════════════════════════════════════════════════════
// Checkout — calls POST /api/orders
// ══════════════════════════════════════════════════════════════════════════════
async function checkout() {
  const buyer = (document.getElementById('checkout-name')?.value || '').trim() || 'Guest';
  const btn   = document.querySelector('.btn-checkout');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  try {
    const results = [];

    for (const item of cart) {
      const res = await fetch(`${ORDER_API}/order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          manga_id: item.manga.id,
          quantity: item.qty,
          buyer: buyer
        })
      });

      const data = await res.json();
      console.log("Order response:", data);

      results.push({ item, data });
    }

    const total = cart.reduce((s,c) => s + c.manga.price * c.qty, 0);
    const allOk = results.every(r => r.data.status === 'success');

    if (!allOk) throw new Error("Some orders failed");

    // ✅ SUCCESS FLOW
    cart = [];
    updateCartCount();
    closeModal('modal-cart');

    document.getElementById('result-body').innerHTML = `
      <div class="order-confirm">
        <div class="icon">✅</div>
        <h2>Order Confirmed!</h2>
        <div class="confirm-details">
          <div class="confirm-row"><span>Buyer</span><span>${esc(buyer)}</span></div>
          ${results.map(r => `
            <div class="confirm-row">
              <span>${r.item.manga.title} ×${r.item.qty}</span>
              <span>₱${(r.item.manga.price * r.item.qty).toFixed(2)}</span>
            </div>`).join('')}
          <div class="confirm-row">
            <span>Total Charged</span>
            <span style="color:var(--gold)">₱${total.toFixed(2)}</span>
          </div>
          <div class="confirm-row">
            <span>Transaction ID</span>
            <span class="txn-id">${results[0].data.transaction_id}</span>
          </div>
        </div>
      </div>
    `;

    openModal('modal-result');
    toast('Order placed successfully! 🎉');

    init(); // refresh stock

  } catch (e) {
    console.error("Checkout error:", e);
    toast("Checkout failed. Please try again.", true);
  }

  btn.disabled = false;
  btn.textContent = 'Confirm Order →';
}

// ══════════════════════════════════════════════════════════════════════════════
// Modals
// ══════════════════════════════════════════════════════════════════════════════
function openModal(id) {
  if (id === 'modal-cart') renderCart();
  document.getElementById(id).classList.add('open');
}
function closeModal(id)      { document.getElementById(id).classList.remove('open'); }
function bgClose(id, e)      { if (e.target.id === id) closeModal(id); }

// ══════════════════════════════════════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════════════════════════════════════
function toast(msg, isErr=false) {
  const el = document.createElement('div');
  el.className = 'toast' + (isErr?' err':'');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.animation='slideOut 0.3s ease forwards'; setTimeout(()=>el.remove(),300); }, 3200);
}

// ══════════════════════════════════════════════════════════════════════════════
// Utility
// ══════════════════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
